<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programs · Streetlamp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ── */
    :root {
      --ink:       #fdfdfd;
      --bg:        #020202;
      --surface:   #0f0f0f;
      --surface2:  #181818;
      --accent:    #cc3399;
      --accent-lt: #e055b3;
      --rule:      rgba(253,253,253,.09);
      --radius:    4px;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
      --ease:      cubic-bezier(.22,.68,0,1.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════
       NORMAL MODE — header + sidebar layout
    ══════════════════════════════════════ */

    header {
      border-bottom: 1px solid var(--rule);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }
    .header-logo { height: 32px; width: auto; display: block; }
    .header-divider { width: 1px; height: 22px; background: var(--rule); }
    .tagline {
      font-size: .72rem;
      font-weight: 400;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .35;
    }

    .shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      min-height: 0;
    }

    aside {
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }
    .sidebar-head {
      padding: 18px 24px 12px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .3;
    }
    .program-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .program-list::-webkit-scrollbar { width: 4px; }
    .program-list::-webkit-scrollbar-track { background: transparent; }
    .program-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    .program-item {
      display: flex;
      align-items: center;
      cursor: pointer;
      padding: 14px 24px;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s;
      animation: fadeUp .25s var(--ease) both;
    }
    .program-item:hover { background: var(--surface2); }
    .program-item.active { border-left-color: var(--accent); background: rgba(204,51,153,.07); }
    .program-item.active .prog-name { color: var(--accent); }

    .prog-info { flex: 1; min-width: 0; }
    .prog-name {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      transition: color .15s;
    }
    .prog-date { font-size: .7rem; color: var(--ink); opacity: .35; margin-top: 2px; font-weight: 300; }

    .copy-btn {
      opacity: 0;
      transition: opacity .15s;
      background: none;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-family: var(--sans);
      font-size: .7rem;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .program-item:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .copy-btn.did-copy { background: var(--accent); color: white; border-color: var(--accent); opacity: 1; }

    .sidebar-state { padding: 32px 24px; font-size: .85rem; color: var(--ink); opacity: .3; font-weight: 300; }

    main { display: flex; flex-direction: column; min-height: 0; position: relative; background: var(--bg); }

    .viewer-toolbar {
      padding: 14px 28px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 57px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .viewer-title { font-family: var(--serif); font-size: 1.15rem; font-weight: 600; font-style: italic; }
    .viewer-actions { display: flex; gap: 8px; }

    .action-btn {
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .02em;
      border: 1px solid transparent;
    }
    .action-btn.outline { background: transparent; border-color: var(--rule); color: var(--ink); }
    .action-btn.outline:hover { background: var(--surface2); border-color: rgba(253,253,253,.2); }
    .action-btn.solid { background: var(--accent); color: white; }
    .action-btn.solid:hover { background: var(--accent-lt); }

    .viewer-frame-wrap { flex: 1; position: relative; background: #080808; min-height: 0; }
    iframe#viewer {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; display: block;
      opacity: 0; transition: opacity .3s;
    }
    iframe#viewer.loaded { opacity: 1; }

    .empty-state {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--ink); opacity: .3; pointer-events: none;
    }
    .empty-state svg { width: 48px; height: 48px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .empty-state p { font-family: var(--serif); font-size: 1.1rem; font-style: italic; }

    /* ══════════════════════════════════════
       EMBED MODE — fullscreen PDF only
    ══════════════════════════════════════ */
    body.embed-mode header          { display: none; }
    body.embed-mode .shell          { display: block; height: 100dvh; }
    body.embed-mode aside           { display: none; }
    body.embed-mode main            { height: 100dvh; }
    body.embed-mode .viewer-toolbar { display: none; }
    body.embed-mode .empty-state    { display: none; }
    body.embed-mode iframe#viewer   { opacity: 1; }

    /* ── branded footer bug ── */
    .embed-footer {
      display: none;
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
      background: rgba(15,15,15,.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 8px 12px 8px 10px;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--ink);
      font-family: var(--sans);
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .03em;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .4s .6s, transform .4s .6s var(--ease), background .15s;
      cursor: pointer;
    }
    .embed-footer:hover { background: rgba(24,24,24,.95); }
    .ef-logo { height: 18px; width: auto; display: block; opacity: .7; }
    .ef-label { opacity: .5; }

    body.embed-mode .embed-footer         { display: flex; }
    body.embed-mode .embed-footer.visible { opacity: 1; transform: translateY(0); }

    /* ── not found ── */
    .not-found {
      display: none;
      position: fixed; inset: 0;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; background: var(--bg);
    }
    .not-found.show { display: flex; }
    .not-found .nf-icon { height: 48px; width: auto; opacity: .15; }
    .not-found p  { font-family: var(--serif); font-style: italic; font-size: 1.15rem; opacity: .4; }
    .not-found a  { font-size: .78rem; color: var(--accent); text-decoration: none; margin-top: 4px; opacity: .7; }
    .not-found a:hover { opacity: 1; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      header { padding: 14px 20px; }
      .shell  { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      aside   { border-right: none; border-bottom: 1px solid var(--rule); max-height: 200px; }
      .program-list { max-height: 140px; }
      .copy-btn { opacity: 1; }
      .viewer-toolbar { padding: 12px 16px; }
    }

    /* ── SHIMMER ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
      height: 14px; margin-bottom: 6px;
    }
    .shimmer-row { padding: 14px 24px; display: flex; flex-direction: column; gap: 4px; }
    .shimmer.short { width: 55%; height: 10px; opacity: .5; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ══ HEADER (normal mode) ══════════════════════════════════ -->

  <a href="https://www.streetlamp.org" target="_blank" style="display:block;line-height:0">

  <span class="tagline">Digital Programs</span>

<!-- ══ MAIN LAYOUT ══════════════════════════════════════════ -->
<div class="shell">
  <aside>
    <div class="sidebar-head">
      <span class="sidebar-label">Programs</span>
    </div>
    <div class="program-list" id="programList">
      <div class="shimmer-row"><div class="shimmer"></div><div class="shimmer short"></div></div>
      <div class="shimmer-row"><div class="shimmer"></div><div class="shimmer short"></div></div>
      <div class="shimmer-row"><div class="shimmer"></div><div class="shimmer short"></div></div>
    </div>
  </aside>

  <main>
    <div class="viewer-toolbar">
      <span class="viewer-title" id="viewerTitle" style="opacity:.3;font-style:normal;font-size:.85rem;font-family:var(--sans)">Select a program to view</span>
      <div class="viewer-actions" id="viewerActions" style="display:none">
        <button class="action-btn outline" id="copyToolbarBtn" onclick="copyCurrentLink()">Copy link</button>
        <button class="action-btn solid"                        onclick="openCurrent()">Open ↗</button>
      </div>
    </div>
    <div class="viewer-frame-wrap">
      <iframe id="viewer" title="Program viewer" allowfullscreen></iframe>
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <p>Select a program from the list</p>
      </div>
    </div>
  </main>
</div>

<!-- ══ EMBED MODE: branded footer bug ════════════════════════ -->
<a class="embed-footer" id="embedFooter" href="https://programs.streetlamp.org" target="_blank">
  <!-- Streetlamp lamp icon only, no wordmark, kept compact -->
  <svg class="ef-logo" viewBox="0 0 1500 1500" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path fill="#fdfdfd" d="M1315.82,76.28v956.28h-259.08c0-242.15,93.17-430.39,133.23-500.08l42.65-74.2-73.14-44.44c-34.42-20.91-102.39-64.17-170.86-118.9-79.61-63.61-133.93-121.71-161.49-172.68l-24.86-45.99h513.55Z"/>
    <path fill="#fdfdfd" d="M184.18,1032.56h259.08c0-242.17-93.17-430.39-133.23-500.07l-42.65-74.2,73.14-44.44c34.42-20.91,102.39-64.17,170.85-118.89,79.61-63.62,133.94-121.72,161.5-172.69l24.86-45.98H184.18v956.28Z"/>

  <span class="ef-label" style="display:none">programs.streetlamp.org</span>

<!-- ══ NOT FOUND (embed mode) ════════════════════════════════ -->
<div class="not-found" id="notFound">
  <svg class="nf-icon" viewBox="0 0 1500 1500" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path fill="#fdfdfd" d="M793.98,1032.56h175.08c0-265.62,104.07-472.75,144.89-543.77-36.94-22.44-108.08-67.8-180.07-125.33-89.22-71.3-150.67-138.03-183.89-199.48-33.22,61.45-94.66,128.18-183.89,199.48-71.99,57.54-143.13,102.89-180.07,125.33,40.82,71.02,144.89,278.15,144.89,543.77h175.22v87.69H184.18v87.69h1131.65v-87.69h-521.85v-87.69Z"/>
  </svg>
  <p>Program not found</p>
  <a href="https://programs.streetlamp.org">View all programs →</a>
</div>

<script>
  // ============================================================
  //  ✏️ PASTE YOUR APPS SCRIPT DEPLOYMENT URL HERE
  // ============================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw44bEVHQ9gSOwGh5eeq20IFfmbpFV3UaF1DNKmTNuZmXZuDpG54AfD2xUHJFiBfWAabg/exec';
  // ============================================================

  const BASE_URL  = 'https://programs.streetlamp.org';
  const params    = new URLSearchParams(window.location.search);
  const showParam = params.get('show');   // e.g. ?show=Annie%20Kids
  const embedMode = !!showParam;

  let currentUrl  = null;
  let currentName = null;
  let activeItem  = null;

  if (embedMode) {
    document.body.classList.add('embed-mode');
    document.title = decodeURIComponent(showParam) + ' · Streetlamp';
  }

  // ── JSONP helper (bypasses CORS) ─────────────────────────────
  function jsonp(url) {
    return new Promise(function(resolve, reject) {
      const cb     = 'slp_' + Date.now();
      const script = document.createElement('script');
      window[cb] = function(data) {
        delete window[cb];
        document.body.removeChild(script);
        resolve(data);
      };
      script.onerror = function() {
        delete window[cb];
        document.body.removeChild(script);
        reject(new Error('JSONP failed'));
      };
      script.src = url + '&callback=' + cb;
      document.body.appendChild(script);
    });
  }

  // ── FETCH ────────────────────────────────────────────────────
  async function loadPrograms() {
    try {
      const programs = await jsonp(APPS_SCRIPT_URL + '?action=list');
      renderList(programs);

      if (embedMode) {
        const target = decodeURIComponent(showParam).toLowerCase();
        const match  = programs.find(function(p) {
          return p.showName.toLowerCase() === target;
        });
        if (match) {
          openProgram(match.url, match.showName, null);
          setTimeout(function() {
            document.getElementById('embedFooter').classList.add('visible');
          }, 900);
        } else {
          document.getElementById('notFound').classList.add('show');
        }
      }
    } catch (err) {
      if (!embedMode) {
        document.getElementById('programList').innerHTML =
          '<div class="sidebar-state">Couldn\'t load programs.</div>';
      }
    }
  }

  // ── RENDER LIST ──────────────────────────────────────────────
  function renderList(programs) {
    const list = document.getElementById('programList');
    if (!programs.length) {
      list.innerHTML = '<div class="sidebar-state">No programs uploaded yet.</div>';
      return;
    }
    list.innerHTML = '';
    programs.forEach(function(p, i) {
      const item = document.createElement('div');
      item.className = 'program-item';
      item.style.animationDelay = (i * 40) + 'ms';
      item.innerHTML =
        '<div class="prog-info">' +
          '<div class="prog-name">' + esc(p.showName) + '</div>' +
          '<div class="prog-date">' + esc(p.date)     + '</div>' +
        '</div>' +
        '<button class="copy-btn">Copy link</button>';

      // Copy button → pretty URL
      item.querySelector('.copy-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        copyLink(getPrettyLink(p.showName), this);
      });

      item.addEventListener('click', function() {
        openProgram(p.url, p.showName, item);
      });

      list.appendChild(item);
    });
  }

  // ── OPEN PROGRAM ─────────────────────────────────────────────
  function openProgram(driveUrl, name, itemEl) {
    if (activeItem) activeItem.classList.remove('active');
    if (itemEl) { activeItem = itemEl; itemEl.classList.add('active'); }

    currentUrl  = driveUrl;
    currentName = name;

    const title = document.getElementById('viewerTitle');
    title.textContent  = name;
    title.style.opacity    = '1';
    title.style.fontStyle  = 'italic';
    title.style.fontSize   = '1.15rem';
    title.style.fontFamily = 'var(--serif)';
    document.getElementById('viewerActions').style.display = 'flex';

    const iframe = document.getElementById('viewer');
    iframe.classList.remove('loaded');
    iframe.onload = function() { iframe.classList.add('loaded'); };
    iframe.src = driveUrl;

    document.getElementById('emptyState').style.display = 'none';
  }

  // ── HELPERS ───────────────────────────────────────────────────
  function getPrettyLink(showName) {
    return BASE_URL + '/?show=' + encodeURIComponent(showName);
  }

  function copyLink(url, btn) {
    navigator.clipboard.writeText(url).then(function() {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('did-copy');
      setTimeout(function() { btn.textContent = orig; btn.classList.remove('did-copy'); }, 1800);
    });
  }

  function copyCurrentLink() {
    if (!currentName) return;
    const btn = document.getElementById('copyToolbarBtn');
    copyLink(getPrettyLink(currentName), btn);
  }

  function openCurrent() {
    if (currentName) window.open(getPrettyLink(currentName), '_blank');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadPrograms();
</script>
<!-- ── STAFF LINK ── -->
<a href="/upload" style="
  position: fixed;
  bottom: 14px;
  left: 18px;
  font-family: var(--sans);
  font-size: .68rem;
  color: var(--ink);
  opacity: .15;
  letter-spacing: .04em;
  transition: opacity .2s;
  z-index: 50;
" onmouseover="this.style.opacity='.5'" onmouseout="this.style.opacity='.15'">Staff ↗</a>

</body>
</html>
