<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show Programs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ── */
    :root {
      --ink:       #1a1714;
      --parchment: #f7f3ee;
      --warm:      #e8dfd4;
      --accent:    #8b3a2a;
      --accent-lt: #c4624e;
      --rule:      rgba(26,23,20,.12);
      --shadow:    0 2px 24px rgba(26,23,20,.08);
      --radius:    4px;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'DM Sans', system-ui, sans-serif;
      --ease:      cubic-bezier(.22,.68,0,1.2);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--parchment);
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--rule);
      padding: 20px 32px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      background: var(--parchment);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .wordmark {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: .01em;
      color: var(--ink);
    }
    .wordmark em {
      font-style: italic;
      color: var(--accent);
    }
    .tagline {
      font-size: .75rem;
      font-weight: 300;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .45;
    }

    /* ── LAYOUT ── */
    .shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── SIDEBAR ── */
    aside {
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--rule);
    }
    .sidebar-label {
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .4;
    }
    .program-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .program-list::-webkit-scrollbar { width: 4px; }
    .program-list::-webkit-scrollbar-track { background: transparent; }
    .program-list::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 2px; }

    /* ── PROGRAM ITEM ── */
    .program-item {
      display: flex;
      align-items: center;
      gap: 0;
      cursor: pointer;
      padding: 14px 24px;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s;
      position: relative;
    }
    .program-item:hover { background: var(--warm); }
    .program-item.active {
      border-left-color: var(--accent);
      background: rgba(139,58,42,.05);
    }
    .program-item.active .prog-name { color: var(--accent); }

    .prog-info { flex: 1; min-width: 0; }
    .prog-name {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
      transition: color .15s;
    }
    .prog-date {
      font-size: .7rem;
      color: var(--ink);
      opacity: .4;
      margin-top: 2px;
      font-weight: 300;
    }

    .copy-btn {
      opacity: 0;
      transition: opacity .15s;
      background: none;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-family: var(--sans);
      font-size: .7rem;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .program-item:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: var(--ink); color: var(--parchment); border-color: var(--ink); }
    .copy-btn.did-copy { background: var(--accent); color: white; border-color: var(--accent); opacity: 1; }

    /* ── STATES ── */
    .sidebar-state {
      padding: 32px 24px;
      font-size: .85rem;
      color: var(--ink);
      opacity: .4;
      font-weight: 300;
    }

    /* ── VIEWER PANE ── */
    main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }

    .viewer-toolbar {
      padding: 14px 28px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 57px;
    }
    .viewer-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
    }
    .viewer-actions { display: flex; gap: 8px; }

    .action-btn {
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .02em;
      border: 1px solid transparent;
    }
    .action-btn.outline {
      background: transparent;
      border-color: var(--rule);
      color: var(--ink);
    }
    .action-btn.outline:hover { background: var(--warm); border-color: var(--ink); }
    .action-btn.solid {
      background: var(--accent);
      color: white;
    }
    .action-btn.solid:hover { background: var(--accent-lt); }

    .viewer-frame-wrap {
      flex: 1;
      position: relative;
      background: #d8d0c6;
    }
    iframe#viewer {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity .3s;
    }
    iframe#viewer.loaded { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--ink);
      opacity: .3;
      pointer-events: none;
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .empty-state p {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-style: italic;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      .tagline { display: none; }

      .shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }

      aside {
        border-right: none;
        border-bottom: 1px solid var(--rule);
        max-height: 220px;
      }
      .program-list { max-height: 160px; }

      .copy-btn { opacity: 1; }

      .viewer-toolbar { padding: 12px 16px; }
      .viewer-frame-wrap { min-height: 60dvh; }
    }

    /* ── LOADING SHIMMER ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, var(--warm) 25%, var(--parchment) 50%, var(--warm) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
      height: 14px;
      margin-bottom: 6px;
    }
    .shimmer-row {
      padding: 14px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .shimmer.short { width: 55%; height: 10px; opacity: .5; }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .program-item { animation: fadeUp .25s var(--ease) both; }
  </style>
</head>
<body>

<header>
  <!-- ✏️ Replace with your organization / show name -->
  <span class="wordmark">Stage<em>Notes</em></span>
  <span class="tagline">Digital Programs</span>
</header>

<div class="shell">
  <aside>
    <div class="sidebar-head">
      <span class="sidebar-label">Programs</span>
    </div>
    <div class="program-list" id="programList">
      <!-- shimmer placeholders while loading -->
      <div class="shimmer-row"><div class="shimmer"></div><div class="shimmer short"></div></div>
      <div class="shimmer-row"><div class="shimmer"></div><div class="shimmer short"></div></div>
      <div class="shimmer-row"><div class="shimmer"></div><div class="shimmer short"></div></div>
    </div>
  </aside>

  <main>
    <div class="viewer-toolbar" id="toolbar">
      <span class="viewer-title" id="viewerTitle" style="opacity:.3;font-style:normal;font-size:.85rem;">Select a program to view</span>
      <div class="viewer-actions" id="viewerActions" style="display:none">
        <button class="action-btn outline" id="copyToolbarBtn" onclick="copyCurrentLink()">Copy link</button>
        <button class="action-btn solid" id="openBtn" onclick="openCurrent()">Open ↗</button>
      </div>
    </div>

    <div class="viewer-frame-wrap">
      <iframe id="viewer" title="Program viewer" allowfullscreen></iframe>
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <p>Select a program from the list</p>
      </div>
    </div>
  </main>
</div>

<script>
  // ============================================================
  //  ✏️ PASTE YOUR APPS SCRIPT DEPLOYMENT URL HERE
  // ============================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw44bEVHQ9gSOwGh5eeq20IFfmbpFV3UaF1DNKmTNuZmXZuDpG54AfD2xUHJFiBfWAabg/exec';
  // ============================================================

  let currentUrl  = null;
  let activeItem  = null;

  // ── FETCH PROGRAMS ──────────────────────────────────────────
  async function loadPrograms() {
    try {
      const res      = await fetch(APPS_SCRIPT_URL + '?action=list');
      const programs = await res.json();
      renderList(programs);
    } catch (err) {
      document.getElementById('programList').innerHTML =
        '<div class="sidebar-state">Couldn\'t load programs.<br>Check the Apps Script URL.</div>';
    }
  }

  // ── RENDER LIST ─────────────────────────────────────────────
  function renderList(programs) {
    const list = document.getElementById('programList');

    if (!programs.length) {
      list.innerHTML = '<div class="sidebar-state">No programs uploaded yet.</div>';
      return;
    }

    list.innerHTML = '';
    programs.forEach(function(p, i) {
      const item = document.createElement('div');
      item.className = 'program-item';
      item.style.animationDelay = (i * 40) + 'ms';
      item.dataset.url  = p.url;
      item.dataset.name = p.showName;
      item.innerHTML =
        '<div class="prog-info">' +
          '<div class="prog-name">' + esc(p.showName) + '</div>' +
          '<div class="prog-date">' + esc(p.date)     + '</div>' +
        '</div>' +
        '<button class="copy-btn" title="Copy viewer link">Copy link</button>';

      item.querySelector('.copy-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        copyLink(p.url, this);
      });

      item.addEventListener('click', function() {
        openProgram(p.url, p.showName, item);
      });

      list.appendChild(item);
    });
  }

  // ── OPEN PROGRAM IN VIEWER ───────────────────────────────────
  function openProgram(url, name, itemEl) {
    if (activeItem) activeItem.classList.remove('active');
    activeItem = itemEl;
    itemEl.classList.add('active');

    currentUrl = url;

    // Update toolbar
    const title = document.getElementById('viewerTitle');
    title.textContent  = name;
    title.style.opacity = '1';
    title.style.fontStyle = 'italic';
    title.style.fontSize  = '1.15rem';
    document.getElementById('viewerActions').style.display = 'flex';

    // Load iframe
    const iframe = document.getElementById('viewer');
    iframe.classList.remove('loaded');
    iframe.onload = function() { iframe.classList.add('loaded'); };
    iframe.src = url;

    document.getElementById('emptyState').style.display = 'none';
  }

  // ── COPY HELPERS ─────────────────────────────────────────────
  function copyLink(url, btn) {
    navigator.clipboard.writeText(url).then(function() {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('did-copy');
      setTimeout(function() {
        btn.textContent = orig;
        btn.classList.remove('did-copy');
      }, 1800);
    });
  }

  function copyCurrentLink() {
    if (!currentUrl) return;
    const btn = document.getElementById('copyToolbarBtn');
    copyLink(currentUrl, btn);
  }

  function openCurrent() {
    if (currentUrl) window.open(currentUrl, '_blank');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  loadPrograms();
</script>
</body>
</html>
